#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

stories:
- story: happy path 1
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      amazing
    intent: mood_great
  - action: utter_happy

- story: happy path 2
  steps:
  - user: |
      hello there!
    intent: greet
  - action: utter_greet
  - user: |
      amazing
    intent: mood_great
  - action: utter_happy
  - user: |
      bye-bye!
    intent: goodbye
  - action: utter_goodbye

- story: sad path 1
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      not good
    intent: mood_unhappy
  - action: utter_cheer_up
  - action: utter_did_that_help
  - user: |
      yes
    intent: affirm
  - action: utter_happy

- story: sad path 2
  steps:
  - user: |
      hello
    intent: greet
  - action: utter_greet
  - user: |
      not good
    intent: mood_unhappy
  - action: utter_cheer_up
  - action: utter_did_that_help
  - user: |
      not really
    intent: deny
  - action: utter_goodbye

- story: sad path 3
  steps:
  - user: |
      hi
    intent: greet
  - action: utter_greet
  - user: |
      very terrible
    intent: mood_unhappy
  - action: utter_cheer_up
  - action: utter_did_that_help
  - user: |
      no
    intent: deny
  - action: utter_goodbye

- story: say goodbye
  steps:
  - user: |
      bye-bye!
    intent: goodbye
  - action: utter_goodbye

- story: bot challenge
  steps:
  - user: |
      are you a bot?
    intent: bot_challenge
  - action: utter_iamabot

- story: loan eligibility check
  steps:
  - user: |
      Can I check my loan eligibility?
    intent: check_loan_eligibility
  - action: utter_check_loan_eligibility

- story: start loan eligibility check
  steps:
  - user: |
      I want to check my loan eligibility.
    intent: start_eligibility_check
  - action: utter_start_eligibility_check

- story: start e-KYC process
  steps:
  - user: |
      How do I start e-KYC?
    intent: start_ekyc
  - action: utter_start_ekyc

- story: loan FAQs
  steps:
  - user: |
      What documents are needed for a loan?
    intent: loan_faq
  - action: utter_loan_faq

- story: loan eligibility confirmation
  steps:
  - user: |
      Can I check my loan eligibility?
    intent: check_loan_eligibility
  - action: utter_check_loan_eligibility
  - user: |
      Yes, I want to proceed.
    intent: affirm
  - action: utter_start_eligibility_check

- story: start e-KYC with confirmation
  steps:
  - user: |
      How do I start e-KYC?
    intent: start_ekyc
  - user: |
      Okay, let's proceed.
    intent: affirm
  - action: utter_start_ekyc

- story: decline e-KYC
  steps:
  - user: |
      How do I start e-KYC?
    intent: start_ekyc
  - action: utter_start_ekyc
  - user: |
      No, I don't want to proceed.
    intent: deny
  - action: utter_goodbye
