<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-LAP Portal</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Add CSS styles for role select and lender configurations */
        .select-group {
            position: relative;
            margin-bottom: 25px;
        }
        .select-group select {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid var(--light-gray, #e0e0e0);
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            color: var(--text-dark, #333);
            outline: none;
            transition: all 0.3s ease;
        }
        .select-group select:focus {
            border-color: var(--accent-blue, #6366f1);
        }
        .select-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light, #999);
        }
        .lender-section {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none; /* Hidden by default */
            animation: fadeIn 0.4s ease;
        }
        .lender-section h3 {
            font-size: 1.1rem;
            color: #0f172a;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card" style="max-width: 600px; width: 100%; margin: 40px auto;">
            <div class="card-header">
                <img src="https://via.placeholder.com/40x40" alt="E-LAP Logo" class="logo">
                <h1>Create Account</h1>
                <p>Register as a Borrower or Lender on E-LAP</p>
            </div>

            <form id="registerForm" class="register-form">
                <!-- Common User Details -->
                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" required>
                        <label for="fullName">Full Name</label>
                        <div class="input-highlight"></div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="username" required>
                        <label for="username">Username</label>
                        <div class="input-highlight"></div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required>
                        <label for="email">Email Address</label>
                        <div class="input-highlight"></div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" required pattern="[0-9]{10}">
                        <label for="phone">Phone Number</label>
                        <div class="input-highlight"></div>
                    </div>
                    <span class="helper-text" data-original="Enter 10-digit mobile number">Enter 10-digit mobile number</span>
                </div>

                <div class="select-group">
                    <i class="fas fa-users-cog"></i>
                    <select id="role" required>
                        <option value="borrower" selected>Register as Borrower</option>
                        <option value="lender">Register as Lender (Financial Institution)</option>
                    </select>
                </div>

                <!-- Borrower Specific Banking Mock Fields -->
                <div id="borrowerFields">
                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-credit-card"></i>
                            <input type="text" id="account" pattern="[0-9]{10,16}">
                            <label for="account">Bank Account Number</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-code"></i>
                            <input type="text" id="ifsc" pattern="[A-Z]{4}[0-9]{7}">
                            <label for="ifsc">IFSC Code</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-building"></i>
                            <input type="text" id="branch">
                            <label for="branch">Branch Name</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>
                </div>

                <!-- Lender Specific Onboarding Profile (Dynamically Shown) -->
                <div id="lenderFields" class="lender-section">
                    <h3>Lender Underwriting Metrics</h3>
                    
                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-landmark"></i>
                            <input type="text" id="companyName">
                            <label for="companyName">Institution / Company Name</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-heartbeat"></i>
                            <input type="number" id="minCibil" min="300" max="900" placeholder="e.g. 700">
                            <label for="minCibil">Minimum CIBIL Score Threshold</label>
                            <div class="input-highlight"></div>
                        </div>
                        <span class="helper-text" style="display:block; margin-top:5px;">Users below this CIBIL score won't be matched.</span>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-rupee-sign"></i>
                            <input type="number" id="maxLoanAmount" placeholder="e.g. 5000000">
                            <label for="maxLoanAmount">Maximum Funding Limit</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fas fa-percent"></i>
                            <input type="number" id="interestRate" step="0.01" placeholder="e.g. 8.99">
                            <label for="interestRate">Interest Rate Offered (% p.a.)</label>
                            <div class="input-highlight"></div>
                        </div>
                    </div>

                    <div class="select-group">
                        <i class="fas fa-tags"></i>
                        <select id="loanTypes" multiple style="height:80px; padding-top:5px;">
                            <option value="Personal" selected>Personal Loans</option>
                            <option value="Home" selected>Home Loans</option>
                            <option value="Business" selected>Business Loans</option>
                            <option value="Education" selected>Education Loans</option>
                        </select>
                        <span class="helper-text" style="display:block; margin-top:5px; font-size:0.8rem;">Hold Ctrl (Cmd) to select multiple types.</span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required>
                        <label for="password">Password</label>
                        <i class="fas fa-eye toggle-password"></i>
                        <div class="input-highlight"></div>
                    </div>
                </div>

                <div class="terms-group">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
